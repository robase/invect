<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twisted Box</title>
<style>
  * { margin: 0; }
  body { background: #000; }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #aaa;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="hud"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const W = window.innerWidth;
const H = window.innerHeight;

const scene = new THREE.Scene();

// Orthographic camera
const frustum = 5.5;
const aspect = W / H;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect,
  frustum, -frustum, 0.1, 100
);
camera.position.set(4, 3, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000);
renderer.shadowMap.enabled = false; // shadows disabled
document.body.appendChild(renderer.domElement);

// --- Lighting ---
const pointLight = new THREE.PointLight(0xffffff, 1.4, 50);
let lightAngle = 0;
const lightRadius = 7;
let lightY = 5;
pointLight.position.set(
  lightRadius * Math.sin(lightAngle),
  lightY,
  lightRadius * Math.cos(lightAngle)
);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0xcccccc, 1.4, 50);
pointLight2.position.set(
  lightRadius * Math.sin(lightAngle + Math.PI),
  lightY,
  lightRadius * Math.cos(lightAngle + Math.PI)
);
scene.add(pointLight2);

scene.add(new THREE.AmbientLight(0x666666, 0.7));

// Box is now twice as tall
const s = 1;
const h = 4;
const bottomVertsBase = [
  [-s, -h,  s],
  [ s, -h,  s],
  [ s, -h, -s],
  [-s, -h, -s],
];
const topVertsBase = [
  [-s,  h,  s],
  [ s,  h,  s],
  [ s,  h, -s],
  [-s,  h, -s],
];

function buildGeometry(bottomVerts, topVerts, positive) {
  const all = [
    ...bottomVerts.map(v => new THREE.Vector3(...v)),
    ...topVerts.map(v => new THREE.Vector3(...v))
  ];

  const faces = [
    [0,2,1], [0,3,2],
    [4,5,6], [4,6,7],
  ];

  const sides = [
    [0, 1, 5, 4],
    [2, 3, 7, 6],
    [1, 2, 6, 5],
    [3, 0, 4, 7],
  ];

  for (const [a, b, c, d] of sides) {
    if (positive) {
      faces.push([a, b, d], [b, c, d]);
    } else {
      faces.push([a, b, c], [a, c, d]);
    }
  }

  const positions = [];
  for (const tri of faces) {
    for (const idx of tri) {
      positions.push(all[idx].x, all[idx].y, all[idx].z);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

const mat = new THREE.MeshPhongMaterial({
  color: 0xffffff,
  side: THREE.FrontSide,
  shininess: 10,
  specular: 0x222222,
});

let mesh;

function rebuildMesh(bottomVerts, topVerts, positive) {
  if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); }
  const geo = buildGeometry(bottomVerts, topVerts, positive);
  mesh = new THREE.Mesh(geo, mat);
  // mesh.rotation.y = animTime * 0.0003;
  scene.add(mesh);
}

// Orbit controls
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = Math.PI / 12, rotY = 0;
let camDist = 12;

function updateCamera() {
  camera.position.set(
    camDist * Math.cos(rotX) * Math.sin(rotY),
    camDist * Math.sin(rotX),
    camDist * Math.cos(rotX) * Math.cos(rotY)
  );
  camera.lookAt(0, 0, 0);
  camera.updateMatrixWorld();
  camera.updateProjectionMatrix();
}
updateCamera();

renderer.domElement.addEventListener('pointerdown', e => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointerup', () => isDragging = false);
window.addEventListener('pointermove', e => {
  if (!isDragging) return;
  rotY -= (e.clientX - prevMouse.x) * 0.008;
  rotX += (e.clientY - prevMouse.y) * 0.008;
  rotX = Math.max(-1.2, Math.min(1.2, rotX));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});

let frustumScale = 1;
renderer.domElement.addEventListener('wheel', e => {
  frustumScale *= e.deltaY > 0 ? 1.05 : 0.95;
  frustumScale = Math.max(0.5, Math.min(3, frustumScale));
  const f = frustum * frustumScale;
  camera.left = -f * aspect;
  camera.right = f * aspect;
  camera.top = f;
  camera.bottom = -f;
  camera.updateProjectionMatrix();
});

// Pause
let paused = false;
const keysDown = new Set();
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
  }
  if (e.code === 'KeyZ' || e.code === 'KeyX' || e.code === 'KeyW' || e.code === 'KeyS') keysDown.add(e.code);
});
window.addEventListener('keyup', e => {
  keysDown.delete(e.code);
});

// Build static twisted mesh
const twistAngle = -Math.PI / 4;

const topVerts = topVertsBase.map(([x, y, z]) => [
  Math.cos(twistAngle) * x - Math.sin(twistAngle) * z,
  y,
  Math.sin(twistAngle) * x + Math.cos(twistAngle) * z,
]);

const bottomVerts = bottomVertsBase.map(([x, y, z]) => [
  Math.cos(-twistAngle) * x - Math.sin(-twistAngle) * z,
  y,
  Math.sin(-twistAngle) * x + Math.cos(-twistAngle) * z,
]);

rebuildMesh(bottomVerts, topVerts, twistAngle >= 0);

// Animate
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);

  const dt = time - lastTime;
  lastTime = time;

  // Rotate light with Z/X keys, raise/lower with W/S (always active, independent of pause)
  const lightSpeed = 0.002;
  if (keysDown.has('KeyZ')) lightAngle -= lightSpeed * dt;
  if (keysDown.has('KeyX')) lightAngle += lightSpeed * dt;
  const heightSpeed = 0.008;
  if (keysDown.has('KeyW')) lightY += heightSpeed * dt;
  if (keysDown.has('KeyS')) lightY -= heightSpeed * dt;
  pointLight.position.set(
    lightRadius * Math.cos(lightAngle),
    lightY,
    lightRadius * Math.sin(lightAngle)
  );
  pointLight2.position.set(
    lightRadius * Math.cos(lightAngle + Math.PI),
    lightY,
    lightRadius * Math.sin(lightAngle + Math.PI)
  );

  // Update HUD
  const hud = document.getElementById('hud');
  const lx = pointLight.position.x.toFixed(1);
  const ly = pointLight.position.y.toFixed(1);
  const lz = pointLight.position.z.toFixed(1);
  const deg = ((lightAngle * 180 / Math.PI) % 360).toFixed(0);
  hud.textContent = `Light  x:${lx}  y:${ly}  z:${lz}\nAngle: ${deg}°  Height: ${ly}`;

  renderer.setRenderTarget(null);
  renderer.render(scene, camera);
}

animate(0);

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const a = w / h;
  const f = frustum * frustumScale;
  camera.left = -f * a;
  camera.right = f * a;
  camera.top = f;
  camera.bottom = -f;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
