name: Deploy Docs to GitHub Pages

env:
  CUSTOM_DOMAIN: invect.dev

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @invect/core --filter @invect/layouts --filter @invect/ui run build

      - name: Build docs
        run: pnpm --filter @invect/docs run build
        env:
          DOCS_BASE_PATH: ''

      - name: Disable Jekyll processing
        run: touch docs/out/.nojekyll

      - name: Configure custom domain
        run: printf '%s\n' "$CUSTOM_DOMAIN" > docs/out/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
