name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish -r --access public --no-git-checks
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_PUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUB_TOKEN }}

      - name: Create GitHub releases
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            tag="${name}@${version}"

            # Create git tag if it doesn't exist
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              git tag "$tag"
              git push origin "$tag"
            fi

            # Create GitHub release
            gh release create "$tag" \
              --title "$name@$version" \
              --notes "See [CHANGELOG](https://github.com/robase/invect/blob/main/pkg/$(echo $name | sed 's/@invect\///')/CHANGELOG.md) for details." \
              --latest=false \
              2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
